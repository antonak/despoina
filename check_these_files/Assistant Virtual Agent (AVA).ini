Assistant Virtual Agent (AVA)

Ένα έξυπνο εργαλείο Explainable AI που θα μπορεί να απαντά σε ερωτήσεις χρηστών, να μεταφράζει περίπλοκες αποφάσεις ασφαλείας σε απλή γλώσσα, και να δίνει guidance μέσω text/speech.

Θα είναι ενσωματωμένο στο INTACT Dashboard και θα υποστηρίζει εξηγήσιμη επικοινωνία άνθρωπος–μηχανή.

INTACT CyberRange (σε συνεργασία με το AVA)

Ένα sandbox περιβάλλον προσομοίωσης κυβερνοεπιθέσεων βασισμένο σε role-playing game σενάρια.

Θα επιτρέπει σε ειδικούς και μη ειδικούς να εκτελούν σενάρια άμυνας/επίθεσης, να δοκιμάζουν τις υπηρεσίες τους και να μαθαίνουν χωρίς να επηρεάζεται η πραγματική υποδομή.

Θα τρέχει σε εικονικό περιβάλλον (TensorFlow, OpenStack, Azure/AWS/Google Cloud).